name: Rust

on:
  workflow_dispatch:
  pull_request:
  push:

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    name: Tests on ${{ matrix.os }} / Rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: ["1.85", stable]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.toolchain }}
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
    - name: Run cargo test
      run: cargo test --release
    - name: Build without default features
      run: cargo build --release --no-default-features
    - name: Test rustls feature
      run: cargo test --release --no-default-features --features rustls-tls
    - name: Test native TLS feature
      run: cargo test --release --no-default-features --features native-tls

  clippy:
    name: Run Clippy / Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.85", stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- --deny warnings

  fmt:
    name: Run Rustfmt / Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.85", stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run cargo fmt
        run: cargo fmt --all -- --check
